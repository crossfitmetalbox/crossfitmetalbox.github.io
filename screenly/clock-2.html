<!DOCTYPE html>
<html lang="sv-SE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />

    <script type="text/javascript" src="script/countdown.min.js"></script>

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-dark: #0e0e0e;
        --accent: #f16521;
        --accent-secondary: #fec10d;
        --accent-red: #ed1c24;
        --text-primary: #f1f1f1;
        --text-muted: #8a8a8a;
        --steel: #2a2d30;
      }

      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg-dark);
        font-family: "Oswald", sans-serif;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      /* --- Noise texture overlay --- */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 100;
      }

      /* --- Diagonal accent stripe --- */
      body::after {
        content: "";
        position: fixed;
        top: -50%;
        right: -5%;
        width: 8px;
        height: 200%;
        background: linear-gradient(to bottom, var(--accent-secondary), var(--accent), var(--accent-red));
        transform: rotate(12deg);
        opacity: 0.45;
        z-index: 0;
      }

      /* --- Clock layout --- */
      .clock {
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .time-row {
        display: flex;
        align-items: baseline;
        justify-content: center;
      }

      .time {
        font-family: "Bebas Neue", "Oswald", sans-serif;
        font-size: 400px;
        line-height: 0.85;
        letter-spacing: -4px;
        color: var(--text-primary);
      }

      .separator {
        font-family: "Bebas Neue", "Oswald", sans-serif;
        font-size: 360px;
        line-height: 0.85;
        color: var(--accent);
        margin: 0 8px;
        animation: blink 1s step-end infinite;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }

      .day {
        font-family: "Oswald", sans-serif;
        font-size: 64px;
        font-weight: 400;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent);
        margin-top: 20px;
      }

      /* --- Accent line --- */
      .clock-line {
        width: 120px;
        height: 5px;
        background: var(--accent);
        margin: 40px auto 0;
      }

      /* --- MetalBox label --- */
      .label {
        font-family: "Oswald", sans-serif;
        font-size: 22px;
        font-weight: 400;
        letter-spacing: 8px;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-top: 40px;
      }
    </style>
  </head>
  <body>
    <div id="clockdiv" class="clock">
      <div class="time-row">
        <div class="time hours"></div>
        <div class="separator">:</div>
        <div class="time minutes"></div>
      </div>
      <div class="day"></div>
      <div class="clock-line"></div>
    </div>

    <script type="text/javascript">
      initializeClock("clockdiv");
    </script>
  </body>
</html>
