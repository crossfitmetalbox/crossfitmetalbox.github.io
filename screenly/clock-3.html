<!DOCTYPE html>
<html lang="sv-SE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Clock</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-dark: #0e0e0e;
        --accent: #f16521;
        --accent-secondary: #fec10d;
        --accent-red: #ed1c24;
        --text-dim: #1a1a1a;
        --text-active: #f1f1f1;
      }

      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg-dark);
        font-family: "Bebas Neue", "Oswald", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      /* --- Noise texture overlay --- */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 100;
      }

      /* --- Diagonal accent stripe --- */
      body::after {
        content: "";
        position: fixed;
        top: -50%;
        right: -5%;
        width: 8px;
        height: 200%;
        background: linear-gradient(to bottom, var(--accent-secondary), var(--accent), var(--accent-red));
        transform: rotate(12deg);
        opacity: 0.45;
        z-index: 0;
      }

      /* --- Word grid --- */
      .word-clock {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 40px;
        max-width: 1000px;
      }

      .row {
        display: flex;
        justify-content: center;
        gap: 28px;
        margin-bottom: 20px;
      }

      .word {
        font-size: 96px;
        letter-spacing: 4px;
        line-height: 1.1;
        color: var(--text-dim);
        transition: color 0.8s ease, text-shadow 0.8s ease;
        text-transform: uppercase;
      }

      .word.active {
        color: var(--text-active);
        text-shadow: 0 0 40px var(--accent-secondary), 0 0 80px rgba(241, 101, 33, 0.2);
      }

      /* --- Date ribbon --- */
      .date-ribbon {
        position: fixed;
        right: -100px;
        top: 80%;
        transform: translateY(10%) rotate(-78deg);
        transform-origin: center center;
        font-family: "Oswald", sans-serif;
        font-size: 36px;
        font-weight: 400;
        letter-spacing: 8px;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.7;
        z-index: 1;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="date-ribbon" id="date-ribbon"></div>
    <div class="word-clock">
      <div class="row">
        <span class="word" data-word="klockan">Klockan</span>
        <span class="word" data-word="ar">Är</span>
      </div>
      <div class="row">
        <span class="word" data-word="min-fem">Fem</span>
        <span class="word" data-word="min-tio">Tio</span>
        <span class="word" data-word="kvart">Kvart</span>
      </div>
      <div class="row">
        <span class="word" data-word="tjugo">Tjugo</span>
      </div>
      <div class="row">
        <span class="word" data-word="over">Över</span>
        <span class="word" data-word="i">I</span>
        <span class="word" data-word="halv">Halv</span>
      </div>
      <div class="row">
        <span class="word" data-word="ett">Ett</span>
        <span class="word" data-word="tva">Två</span>
        <span class="word" data-word="tre">Tre</span>
      </div>
      <div class="row">
        <span class="word" data-word="fyra">Fyra</span>
        <span class="word" data-word="hour-fem">Fem</span>
        <span class="word" data-word="sex">Sex</span>
      </div>
      <div class="row">
        <span class="word" data-word="sju">Sju</span>
        <span class="word" data-word="atta">Åtta</span>
        <span class="word" data-word="nio">Nio</span>
      </div>
      <div class="row">
        <span class="word" data-word="hour-tio">Tio</span>
        <span class="word" data-word="elva">Elva</span>
        <span class="word" data-word="tolv">Tolv</span>
      </div>
    </div>

    <script>
      var hourWords = {
        1: "ett", 2: "tva", 3: "tre", 4: "fyra",
        5: "hour-fem", 6: "sex", 7: "sju", 8: "atta",
        9: "nio", 10: "hour-tio", 11: "elva", 12: "tolv"
      };

      function getActiveWords() {
        var now = new Date();
        var hours = now.getHours();
        var minutes = now.getMinutes();

        // Round to nearest 5
        var rounded = Math.round(minutes / 5) * 5;
        if (rounded === 60) {
          rounded = 0;
          hours++;
        }

        var active = ["klockan", "ar"];
        var hourRef = hours;

        switch (rounded) {
          case 0:
            break;
          case 5:
            active.push("min-fem", "over");
            break;
          case 10:
            active.push("min-tio", "over");
            break;
          case 15:
            active.push("kvart", "over");
            break;
          case 20:
            active.push("tjugo", "over");
            break;
          case 25:
            active.push("min-fem", "i", "halv");
            hourRef = hours + 1;
            break;
          case 30:
            active.push("halv");
            hourRef = hours + 1;
            break;
          case 35:
            active.push("min-fem", "over", "halv");
            hourRef = hours + 1;
            break;
          case 40:
            active.push("tjugo", "i");
            hourRef = hours + 1;
            break;
          case 45:
            active.push("kvart", "i");
            hourRef = hours + 1;
            break;
          case 50:
            active.push("min-tio", "i");
            hourRef = hours + 1;
            break;
          case 55:
            active.push("min-fem", "i");
            hourRef = hours + 1;
            break;
        }

        var h = hourRef % 12;
        if (h === 0) h = 12;
        active.push(hourWords[h]);

        return active;
      }

      function updateClock() {
        var active = getActiveWords();
        var allWords = document.querySelectorAll(".word");

        for (var i = 0; i < allWords.length; i++) {
          var el = allWords[i];
          if (active.indexOf(el.getAttribute("data-word")) !== -1) {
            el.classList.add("active");
          } else {
            el.classList.remove("active");
          }
        }
      }

      // Set date
      var dayNames = ["Söndag", "Måndag", "Tisdag", "Onsdag", "Torsdag", "Fredag", "Lördag"];
      var monthNames = ["Januari", "Februari", "Mars", "April", "Maj", "Juni",
        "Juli", "Augusti", "September", "Oktober", "November", "December"];
      var today = new Date();
      document.getElementById("date-ribbon").textContent =
        dayNames[today.getDay()] + " " + today.getDate() + " " + monthNames[today.getMonth()];

      updateClock();
      setInterval(updateClock, 10000);
    </script>
  </body>
</html>
