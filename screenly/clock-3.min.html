<!DOCTYPE html><html lang="sv-SE"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Word Clock</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap" rel="stylesheet"><style>*,::after,::before{margin:0;padding:0;box-sizing:border-box}:root{--bg-dark:#0e0e0e;--accent:#f16521;--accent-secondary:#fec10d;--accent-red:#ed1c24;--text-dim:#1a1a1a;--text-active:#f1f1f1}body,html{height:100%;overflow:hidden}body{background:var(--bg-dark);font-family:"Bebas Neue",Oswald,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:100}body::after{content:"";position:fixed;top:-50%;right:-5%;width:8px;height:200%;background:linear-gradient(to bottom,var(--accent-secondary),var(--accent),var(--accent-red));transform:rotate(12deg);opacity:.45;z-index:0}.word-clock{position:relative;z-index:1;text-align:center;padding:40px;max-width:1000px}.row{display:flex;justify-content:center;gap:28px;margin-bottom:20px}.word{font-size:96px;letter-spacing:4px;line-height:1.1;color:var(--text-dim);transition:color .8s ease,text-shadow .8s ease;text-transform:uppercase}.word.active{color:var(--text-active);text-shadow:0 0 40px var(--accent-secondary),0 0 80px rgba(241,101,33,.2)}.date-ribbon{position:fixed;right:-100px;top:80%;transform:translateY(10%) rotate(-78deg);transform-origin:center center;font-family:Oswald,sans-serif;font-size:36px;font-weight:400;letter-spacing:8px;text-transform:uppercase;color:var(--accent);opacity:.7;z-index:1;white-space:nowrap}</style></head><body><div class="date-ribbon" id="date-ribbon"></div><div class="word-clock"><div class="row"><span class="word" data-word="klockan">Klockan</span> <span class="word" data-word="ar">Är</span></div><div class="row"><span class="word" data-word="min-fem">Fem</span> <span class="word" data-word="min-tio">Tio</span> <span class="word" data-word="kvart">Kvart</span></div><div class="row"><span class="word" data-word="tjugo">Tjugo</span></div><div class="row"><span class="word" data-word="over">Över</span> <span class="word" data-word="i">I</span> <span class="word" data-word="halv">Halv</span></div><div class="row"><span class="word" data-word="ett">Ett</span> <span class="word" data-word="tva">Två</span> <span class="word" data-word="tre">Tre</span></div><div class="row"><span class="word" data-word="fyra">Fyra</span> <span class="word" data-word="hour-fem">Fem</span> <span class="word" data-word="sex">Sex</span></div><div class="row"><span class="word" data-word="sju">Sju</span> <span class="word" data-word="atta">Åtta</span> <span class="word" data-word="nio">Nio</span></div><div class="row"><span class="word" data-word="hour-tio">Tio</span> <span class="word" data-word="elva">Elva</span> <span class="word" data-word="tolv">Tolv</span></div></div><script>function getActiveWords(){var e=new Date,a=e.getHours(),t=e.getMinutes(),r=5*Math.round(t/5);60===r&&(r=0,a++);var s=["klockan","ar"],o=a;switch(r){case 0:break;case 5:s.push("min-fem","over");break;case 10:s.push("min-tio","over");break;case 15:s.push("kvart","over");break;case 20:s.push("tjugo","over");break;case 25:s.push("min-fem","i","halv"),o=a+1;break;case 30:s.push("halv"),o=a+1;break;case 35:s.push("min-fem","over","halv"),o=a+1;break;case 40:s.push("tjugo","i"),o=a+1;break;case 45:s.push("kvart","i"),o=a+1;break;case 50:s.push("min-tio","i"),o=a+1;break;case 55:s.push("min-fem","i"),o=a+1}var u=o%12;return 0===u&&(u=12),s.push(hourWords[u]),s}function updateClock(){for(var e=getActiveWords(),a=document.querySelectorAll(".word"),t=0;t<a.length;t++){var r=a[t];-1!==e.indexOf(r.getAttribute("data-word"))?r.classList.add("active"):r.classList.remove("active")}}var hourWords={1:"ett",2:"tva",3:"tre",4:"fyra",5:"hour-fem",6:"sex",7:"sju",8:"atta",9:"nio",10:"hour-tio",11:"elva",12:"tolv"},dayNames=["Söndag","Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag"],monthNames=["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"],today=new Date;document.getElementById("date-ribbon").textContent=dayNames[today.getDay()]+" "+today.getDate()+" "+monthNames[today.getMonth()],updateClock(),setInterval(updateClock,1e4)</script></body></html>
