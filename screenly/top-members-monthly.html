<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top booking members</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-dark: #0e0e0e;
        --bg-card: rgba(22, 22, 22, 0.85);
        --accent: #f16521;
        --accent-secondary: #fec10d;
        --accent-red: #ed1c24;
        --accent-glow: rgba(241, 101, 33, 0.3);
        --text-primary: #f1f1f1;
        --text-muted: #8a8a8a;
        --steel: #2a2d30;
        --gold: #fec10d;
        --silver: #a8b4be;
        --bronze: #c47a2a;
      }

      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg-dark);
        font-family: "Oswald", sans-serif;
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* --- Noise texture overlay --- */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 100;
      }

      /* --- Diagonal accent stripe --- */
      body::after {
        content: "";
        position: fixed;
        top: -50%;
        right: -5%;
        width: 8px;
        height: 200%;
        background: linear-gradient(to bottom, var(--accent-secondary), var(--accent), var(--accent-red));
        transform: rotate(12deg);
        opacity: 0.45;
        z-index: 0;
      }

      /* --- Header --- */
      .header {
        padding: 60px 50px 20px;
        position: relative;
        z-index: 1;
      }

      .header-label {
        font-family: "Oswald", sans-serif;
        font-size: 24px;
        font-weight: 400;
        letter-spacing: 8px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
      }

      .header-title {
        font-family: "Bebas Neue", "Oswald", sans-serif;
        font-size: 96px;
        line-height: 0.95;
        letter-spacing: 3px;
        color: var(--text-primary);
      }

      .header-month {
        font-family: "Bebas Neue", "Oswald", sans-serif;
        font-size: 96px;
        line-height: 0.95;
        letter-spacing: 3px;
        color: var(--accent);
      }

      .header-line {
        width: 100px;
        height: 5px;
        background: var(--accent);
        margin-top: 20px;
      }

      /* --- Podium area --- */
      .podium {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 30px 50px 60px;
        gap: 24px;
        position: relative;
        z-index: 1;
      }

      /* --- Single entry row --- */
      .entry {
        display: flex;
        align-items: stretch;
        background: var(--bg-card);
        border-radius: 0 6px 6px 0;
        overflow: hidden;
        opacity: 0;
        transform: translateX(-40px);
        animation: slideIn 0.6s ease forwards;
        position: relative;
      }

      .entry:nth-child(1) { animation-delay: 0.15s; }
      .entry:nth-child(2) { animation-delay: 0.3s; }
      .entry:nth-child(3) { animation-delay: 0.45s; }
      .entry:nth-child(4) { animation-delay: 0.6s; }
      .entry:nth-child(5) { animation-delay: 0.75s; }
      .entry:nth-child(6) { animation-delay: 0.9s; }

      @keyframes slideIn {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* --- Rank badge --- */
      .entry-rank {
        flex-shrink: 0;
        width: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Bebas Neue", "Oswald", sans-serif;
        font-size: 80px;
        letter-spacing: 2px;
        background: var(--steel);
        position: relative;
      }

      .entry-rank::after {
        content: "";
        position: absolute;
        right: -20px;
        top: 0;
        bottom: 0;
        width: 40px;
        background: var(--steel);
        clip-path: polygon(0 0, 0% 100%, 100% 100%);
      }

      /* --- Medal colors on rank badge --- */
      .entry.gold { border-left: 5px solid var(--gold); }
      .entry.gold .entry-rank {
        color: var(--gold);
      }

      .entry.silver { border-left: 5px solid var(--silver); }
      .entry.silver .entry-rank {
        color: var(--silver);
      }

      .entry.bronze { border-left: 5px solid var(--bronze); }
      .entry.bronze .entry-rank {
        color: var(--bronze);
      }

      .entry.rest { border-left: 5px solid var(--steel); }
      .entry.rest .entry-rank {
        color: var(--text-muted);
      }

      /* --- Crown for #1 --- */
      .crown {
        position: static;
        transform: rotate(-8deg);
        width: 80px;
        opacity: 0.9;
        pointer-events: none;
      }

      /* --- Name area --- */
      .entry-names {
        flex: 1;
        display: flex;
        align-items: center;
        padding: 36px 36px 36px 40px;
        gap: 16px;
        flex-wrap: wrap;
      }

      .entry-name {
        font-family: "Bebas Neue", "Oswald", sans-serif;
        font-size: 64px;
        line-height: 1;
        letter-spacing: 2px;
        color: var(--text-primary);
      }

      /* Separator dot between names sharing a rank */
      .entry-name + .entry-name::before {
        content: "\00b7";
        margin-right: 12px;
        color: var(--text-muted);
      }

      /* --- First place is larger --- */
      .entry.gold .entry-names {
        padding-top: 52px;
        padding-bottom: 52px;
      }

      .entry.gold .entry-name {
        font-size: 88px;
      }

      .entry.gold .entry-rank {
        font-size: 110px;
        width: 190px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-label">MetalBox</div>
      <div class="header-title">MEST AKTIVA</div>
      <div class="header-month">JANUARI</div>
      <div class="header-line"></div>
    </div>

    <div class="podium" id="podium"></div>

    <script>
      var getJSON = function (url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.responseType = "json";
        xhr.onload = function () {
          if (xhr.status === 200) {
            callback(null, xhr.response);
          } else {
            callback(xhr.status, xhr.response);
          }
        };
        xhr.onerror = function () {
          callback("Network error", null);
        };
        xhr.send();
      };

      var podium = document.getElementById("podium");
      var medalClasses = ["gold", "silver", "bronze"];

      getJSON("top-members-monthly.json", function (error, data) {
        if (error) {
          podium.innerHTML = '<div style="color:red;padding:40px;">' + error + "</div>";
          return;
        }

        // Sort descending by reservations
        data.sort(function (a, b) { return b.reservations - a.reservations; });

        // Build display names: first name only, unless duplicates exist
        var firstNames = {};
        for (var i = 0; i < data.length; i++) {
          var parts = data[i].name.split(" ");
          var first = parts[0];
          if (!firstNames[first]) firstNames[first] = 0;
          firstNames[first]++;
        }
        for (var i = 0; i < data.length; i++) {
          var parts = data[i].name.split(" ");
          var first = parts[0];
          if (firstNames[first] > 1 && parts.length > 1) {
            data[i].displayName = first + " " + parts[1].charAt(0);
          } else {
            data[i].displayName = first;
          }
        }

        // Group by reservation count
        var groups = [];
        var lastCount = null;
        for (var i = 0; i < data.length; i++) {
          if (data[i].reservations !== lastCount) {
            groups.push([]);
            lastCount = data[i].reservations;
          }
          groups[groups.length - 1].push(data[i].displayName);
        }

        // Render max 7 spots
        var spot = 1;
        for (var g = 0; g < groups.length && spot <= 7; g++) {
          var cls = spot <= 3 ? medalClasses[spot - 1] : "rest";
          var rankContent = spot === 1
            ? '<img class="crown" src="./images/crown.png" alt="" />'
            : String(spot);

          var namesHtml = "";
          for (var n = 0; n < groups[g].length; n++) {
            namesHtml += '<span class="entry-name">' + groups[g][n] + "</span>";
          }

          var entry = document.createElement("div");
          entry.className = "entry " + cls;
          entry.innerHTML =
            '<div class="entry-rank">' + rankContent + "</div>" +
            '<div class="entry-names">' + namesHtml + "</div>";
          podium.appendChild(entry);

          spot += groups[g].length;
        }
      });
    </script>
  </body>
</html>
