<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="X-UA-Compatible" content="ie=edge"><title>CFMB Schema</title><link href="https://fonts.googleapis.com/css?family=Oswald&display=swap" rel="stylesheet"><style>body{background-color:#275780;background:linear-gradient(#275780,#3d84b8);font-family:Oswald,sans-serif}.bg-icon{left:-40px;position:absolute;top:-20px;width:800px;z-index:-1}ul{list-style-type:none;margin-top:30px;padding:10px}li{color:#eee;padding-bottom:50px;text-align:center}li .title{font-size:5em;font-weight:700}li .subtitle{font-size:3.5em;margin-top:-.5em;font-style:italic}li .date{font-size:3.5em}</style></head><body><div class="bg-icon"><img src="./calendar_angle.svg" alt=""></div><div class="table"><ul id="schema"></ul></div><script>var getJSON=function(e,n){var t=new XMLHttpRequest;t.open("GET",e,!0),t.responseType="json",t.onload=function(){var e=t.status;n(200===e?null:e,t.response)},t.send()},key="total",sortByTotal=function(e,n){return e[key]-n[key]},schemaContainer=document.getElementById("schema");try{var createLine=function(e){var n=document.createElement("li");n.className="entry";var t='<div class="title">'+e.title+"</div>";t+='<div class="subtitle">'+e.subtitle+"</div>",t+='<div class="date">'+e.date+"</div>",n.innerHTML=t,schemaContainer.appendChild(n)},handleError=function(e,n){schemaContainer.innerHTML='<div class="error">'+e+" -- "+(n||"")+"</div>"};getJSON("upcoming.json",function(e,n){if(e)handleError(e,n);else try{for(var t=0;t<n.length;t++)createLine(n[t])}catch(e){handleError(e,n)}})}catch(e){schemaContainer.innerText=e}</script></body></html>
